name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org
      # Fail fast with an actionable message instead of a cryptic 404 after build.
      # A valid-but-wrong token (read-only, wrong account, or a granular token
      # whose package allowlist omits this package) passes `npm whoami` yet makes
      # `npm publish` return 404 — npm masks publish-permission denials as 404 on
      # scoped packages. So we don't just check auth; we confirm this account has
      # read-write on the package before spending time on build/test.
      - name: Verify npm auth & publish access
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add an npm Automation token with publish rights to the @seanhogg scope as repo secret NPM_TOKEN."
            exit 1
          fi
          ME=$(npm whoami) || { echo "::error::npm auth failed — NPM_TOKEN is invalid/expired. Generate a new Automation token at npmjs.com → Access Tokens and update the NPM_TOKEN secret."; exit 1; }
          echo "Authenticated to npm as: ${ME}"
          PKG=$(node -p "require('./package.json').name")
          # If the package already exists, confirm this account can publish to it.
          # (Skip for a brand-new package name, which has no collaborator list yet.)
          if npm view "$PKG" version >/dev/null 2>&1; then
            PERMS=$(npm access list collaborators "$PKG" 2>/dev/null || echo '{}')
            if echo "$PERMS" | grep -q "\"${ME}\": *\"read-write\""; then
              echo "Confirmed: ${ME} has read-write (publish) access to ${PKG}."
            else
              echo "::error::npm user '${ME}' lacks read-write (publish) access to ${PKG}. The NPM_TOKEN authenticates but cannot publish this package — it is read-only, belongs to a different account, or is a granular token whose package allowlist omits ${PKG}. Fix: at npmjs.com → Access Tokens, create an Automation token under an account that maintains ${PKG} (current maintainers can be seen via 'npm owner ls ${PKG}'), or a granular token with read-write that includes ${PKG}/the @seanhogg scope, then update the NPM_TOKEN secret."
              echo "Current collaborators: ${PERMS}"
              exit 1
            fi
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
