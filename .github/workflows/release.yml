name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      # Version is read from the `packageManager` field in package.json.
      # Do not also set `version:` here — action-setup@v4 errors if both exist.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      # Publishes @seanhogg/builderforce-memory-engine, @seanhogg/builderforce-memory, and @seanhogg/builderforce-memory-mcp.
      # pnpm resolves `workspace:^` peer/dep specifiers to real version ranges at pack time.
      - name: Publish
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
