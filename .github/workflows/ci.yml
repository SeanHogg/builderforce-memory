name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Version is read from the `packageManager` field in package.json.
      # Do not also set `version:` here — action-setup@v4 errors if both exist.
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build (core then runtime)
        run: pnpm build

      - name: Test
        run: pnpm test
