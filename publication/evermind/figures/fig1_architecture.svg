<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#222"/>
    </marker>
    <marker id="arrL" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#7a7a7a"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="560" fill="#ffffff"/>

  <!-- title -->
  <text x="450" y="30" font-size="20" text-anchor="middle" font-weight="bold">Evermind: A Three-Layer Self-Updating Cognitive Architecture</text>

  <!-- Client / request -->
  <rect x="40" y="70" width="150" height="58" rx="6" fill="#eef2f7" stroke="#222"/>
  <text x="115" y="95" font-size="14" text-anchor="middle" font-weight="bold">Request x</text>
  <text x="115" y="114" font-size="11" text-anchor="middle">evermind/&lt;ref&gt;</text>

  <!-- Inference router -->
  <rect x="250" y="62" width="170" height="74" rx="6" fill="#fde8d6" stroke="#222"/>
  <text x="335" y="88" font-size="14" text-anchor="middle" font-weight="bold">Inference Router</text>
  <text x="335" y="107" font-size="10.5" text-anchor="middle">complexity · length ·</text>
  <text x="335" y="121" font-size="10.5" text-anchor="middle">perplexity probe</text>

  <line x1="190" y1="99" x2="248" y2="99" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>

  <!-- Frontier bridge (optional) -->
  <rect x="660" y="62" width="200" height="74" rx="6" fill="#f3f3f3" stroke="#7a7a7a" stroke-dasharray="5 3"/>
  <text x="760" y="86" font-size="13" text-anchor="middle" font-weight="bold" fill="#555">Frontier Bridge</text>
  <text x="760" y="104" font-size="10.5" text-anchor="middle" fill="#555">Claude / GPT  (optional)</text>
  <text x="760" y="120" font-size="10.5" text-anchor="middle" fill="#555">escalation only</text>
  <line x1="420" y1="86" x2="658" y2="86" stroke="#7a7a7a" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrL)"/>
  <text x="540" y="78" font-size="10" text-anchor="middle" fill="#7a7a7a">teacher signal (distillation)</text>

  <!-- Evermind brain box -->
  <rect x="60" y="175" width="800" height="330" rx="10" fill="none" stroke="#222" stroke-width="1.4"/>
  <text x="80" y="198" font-size="13" font-weight="bold" fill="#444">Evermind  (on-device, WebGPU / WGSL · zero runtime deps)</text>

  <!-- Cortex -->
  <rect x="90" y="220" width="330" height="160" rx="8" fill="#e8f0fb" stroke="#1f4e79" stroke-width="1.5"/>
  <text x="255" y="246" font-size="15" text-anchor="middle" font-weight="bold" fill="#1f4e79">Cortex — Shared-Expert Hybrid SSM</text>
  <text x="255" y="266" font-size="11" text-anchor="middle">dense always-on backbone (online learning)</text>
  <text x="255" y="283" font-size="11" text-anchor="middle">+ lazily-paged routed SSM experts</text>
  <rect x="110" y="298" width="140" height="64" rx="5" fill="#ffffff" stroke="#1f4e79"/>
  <text x="180" y="318" font-size="10.5" text-anchor="middle" font-weight="bold">Mamba-1 / 2 / 3</text>
  <text x="180" y="334" font-size="9.5" text-anchor="middle">S6 · SSD · complex-ET</text>
  <text x="180" y="350" font-size="9.5" text-anchor="middle">+ hybrid attention</text>
  <rect x="262" y="298" width="140" height="64" rx="5" fill="#ffffff" stroke="#1f4e79"/>
  <text x="332" y="318" font-size="10.5" text-anchor="middle" font-weight="bold">BPE tokenizer</text>
  <text x="332" y="334" font-size="9.5" text-anchor="middle">on-device autograd</text>
  <text x="332" y="350" font-size="9.5" text-anchor="middle">AdamW · WSLA adapt</text>

  <!-- Hippocampus -->
  <rect x="450" y="220" width="380" height="160" rx="8" fill="#e9f6ec" stroke="#1e7a3c" stroke-width="1.5"/>
  <text x="640" y="246" font-size="15" text-anchor="middle" font-weight="bold" fill="#1e7a3c">Hippocampus — Write-Through Memory</text>
  <text x="640" y="266" font-size="11" text-anchor="middle">upsert-by-key · invalidate-on-write</text>
  <rect x="470" y="280" width="160" height="82" rx="5" fill="#ffffff" stroke="#1e7a3c"/>
  <text x="550" y="300" font-size="10.5" text-anchor="middle" font-weight="bold">EvermindCognition</text>
  <text x="550" y="316" font-size="9.3" text-anchor="middle">augment | confirm</text>
  <text x="550" y="330" font-size="9.3" text-anchor="middle">supersede | reject</text>
  <text x="550" y="346" font-size="9.3" text-anchor="middle">version-token cache</text>
  <rect x="645" y="280" width="165" height="82" rx="5" fill="#ffffff" stroke="#1e7a3c"/>
  <text x="727" y="300" font-size="10.5" text-anchor="middle" font-weight="bold">Hybrid Retrieval</text>
  <text x="727" y="316" font-size="9.3" text-anchor="middle">dense (cosine) + BM25</text>
  <text x="727" y="330" font-size="9.3" text-anchor="middle">RRF fusion</text>
  <text x="727" y="346" font-size="9.3" text-anchor="middle">MMR rerank</text>

  <!-- Limbic -->
  <rect x="90" y="400" width="740" height="88" rx="8" fill="#fdeef0" stroke="#9c2533" stroke-width="1.5"/>
  <text x="460" y="426" font-size="15" text-anchor="middle" font-weight="bold" fill="#9c2533">Limbic — Trainable Affective Layer</text>
  <text x="460" y="447" font-size="11" text-anchor="middle">recurrent affect head: personality = setpoints, limbic state = dynamics</text>
  <text x="460" y="465" font-size="10.5" text-anchor="middle" font-style="italic">modulates generation in-the-moment · MSE-trained on (experience, state) → (Δaffect, reward)</text>

  <!-- intra arrows -->
  <line x1="335" y1="136" x2="255" y2="218" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="420" y1="300" x2="448" y2="300" stroke="#1e7a3c" stroke-width="1.4" marker-end="url(#arr)"/>
  <line x1="448" y1="320" x2="420" y2="320" stroke="#1e7a3c" stroke-width="1.4" marker-end="url(#arr)"/>
  <text x="434" y="294" font-size="8.6" text-anchor="middle" fill="#1e7a3c">recall</text>
  <text x="434" y="338" font-size="8.6" text-anchor="middle" fill="#1e7a3c">write</text>

  <line x1="255" y1="380" x2="255" y2="398" stroke="#9c2533" stroke-width="1.4" marker-end="url(#arr)"/>

  <!-- output -->
  <rect x="350" y="515" width="200" height="36" rx="6" fill="#eef2f7" stroke="#222"/>
  <text x="450" y="538" font-size="13" text-anchor="middle" font-weight="bold">Response y  (generated on-device)</text>
  <line x1="460" y1="488" x2="455" y2="513" stroke="#222" stroke-width="1.6" marker-end="url(#arr)"/>
</svg>
