<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a3" markerWidth="8" markerHeight="8" refX="6.5" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#1f4e79"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="430" fill="#ffffff"/>
  <text x="430" y="28" font-size="18" text-anchor="middle" font-weight="bold">Parallel selective scan as an associative prefix (Kogge–Stone)</text>
  <text x="430" y="50" font-size="12" text-anchor="middle" fill="#444">Linear recurrence hₜ = āₜ hₜ₋₁ + b̄ₜ rewritten as a scan over pairs (a, b) with operator ∘</text>

  <!-- operator box -->
  <rect x="250" y="70" width="360" height="40" rx="6" fill="#fde8d6" stroke="#9c4a13"/>
  <text x="430" y="96" font-size="14" text-anchor="middle" font-style="italic">(a₁,b₁) ∘ (a₂,b₂) = ( a₁a₂ ,  a₁b₂ + b₁ )   — associative</text>

  <!-- timeline nodes -->
  <g font-size="12" text-anchor="middle">
    <!-- row labels -->
    <text x="40" y="170" font-size="11" text-anchor="start" fill="#555">inputs (aₜ,bₜ)</text>
    <text x="40" y="250" font-size="11" text-anchor="start" fill="#555">step d=1</text>
    <text x="40" y="330" font-size="11" text-anchor="start" fill="#555">step d=2</text>
    <text x="40" y="400" font-size="11" text-anchor="start" fill="#555">prefix hₜ</text>
  </g>

  <!-- positions -->
  <!-- y rows: 160, 240, 320, 390 -->
  <g>
    <!-- input nodes -->
    <g fill="#e8f0fb" stroke="#1f4e79">
      <circle cx="180" cy="160" r="16"/><circle cx="290" cy="160" r="16"/><circle cx="400" cy="160" r="16"/>
      <circle cx="510" cy="160" r="16"/><circle cx="620" cy="160" r="16"/><circle cx="730" cy="160" r="16"/>
    </g>
    <g font-size="11" text-anchor="middle">
      <text x="180" y="164">t₁</text><text x="290" y="164">t₂</text><text x="400" y="164">t₃</text>
      <text x="510" y="164">t₄</text><text x="620" y="164">t₅</text><text x="730" y="164">t₆</text>
    </g>

    <!-- d=1 nodes -->
    <g fill="#eef2f7" stroke="#1f4e79">
      <circle cx="180" cy="240" r="16"/><circle cx="290" cy="240" r="16"/><circle cx="400" cy="240" r="16"/>
      <circle cx="510" cy="240" r="16"/><circle cx="620" cy="240" r="16"/><circle cx="730" cy="240" r="16"/>
    </g>
    <!-- d=2 nodes -->
    <g fill="#eef2f7" stroke="#1f4e79">
      <circle cx="180" cy="320" r="16"/><circle cx="290" cy="320" r="16"/><circle cx="400" cy="320" r="16"/>
      <circle cx="510" cy="320" r="16"/><circle cx="620" cy="320" r="16"/><circle cx="730" cy="320" r="16"/>
    </g>
    <!-- output -->
    <g fill="#e9f6ec" stroke="#1e7a3c">
      <circle cx="180" cy="390" r="16"/><circle cx="290" cy="390" r="16"/><circle cx="400" cy="390" r="16"/>
      <circle cx="510" cy="390" r="16"/><circle cx="620" cy="390" r="16"/><circle cx="730" cy="390" r="16"/>
    </g>
    <g font-size="10" text-anchor="middle" fill="#1e7a3c">
      <text x="180" y="394">h₁</text><text x="290" y="394">h₂</text><text x="400" y="394">h₃</text>
      <text x="510" y="394">h₄</text><text x="620" y="394">h₅</text><text x="730" y="394">h₆</text>
    </g>
  </g>

  <!-- vertical carry edges -->
  <g stroke="#1f4e79" stroke-width="1.3">
    <line x1="180" y1="176" x2="180" y2="224" marker-end="url(#a3)"/>
    <line x1="290" y1="176" x2="290" y2="224" marker-end="url(#a3)"/>
    <line x1="400" y1="176" x2="400" y2="224" marker-end="url(#a3)"/>
    <line x1="510" y1="176" x2="510" y2="224" marker-end="url(#a3)"/>
    <line x1="620" y1="176" x2="620" y2="224" marker-end="url(#a3)"/>
    <line x1="730" y1="176" x2="730" y2="224" marker-end="url(#a3)"/>
  </g>
  <!-- d=1 combine edges (offset 1) -->
  <g stroke="#9c4a13" stroke-width="1.3">
    <line x1="180" y1="248" x2="278" y2="234" marker-end="url(#a3)"/>
    <line x1="290" y1="248" x2="388" y2="234" marker-end="url(#a3)"/>
    <line x1="400" y1="248" x2="498" y2="234" marker-end="url(#a3)"/>
    <line x1="510" y1="248" x2="608" y2="234" marker-end="url(#a3)"/>
    <line x1="620" y1="248" x2="718" y2="234" marker-end="url(#a3)"/>
  </g>
  <!-- vertical d1->d2 -->
  <g stroke="#1f4e79" stroke-width="1.3">
    <line x1="180" y1="256" x2="180" y2="304" marker-end="url(#a3)"/>
    <line x1="290" y1="256" x2="290" y2="304" marker-end="url(#a3)"/>
    <line x1="400" y1="256" x2="400" y2="304" marker-end="url(#a3)"/>
    <line x1="510" y1="256" x2="510" y2="304" marker-end="url(#a3)"/>
    <line x1="620" y1="256" x2="620" y2="304" marker-end="url(#a3)"/>
    <line x1="730" y1="256" x2="730" y2="304" marker-end="url(#a3)"/>
  </g>
  <!-- d=2 combine edges (offset 2) -->
  <g stroke="#9c4a13" stroke-width="1.3">
    <line x1="180" y1="328" x2="388" y2="314" marker-end="url(#a3)"/>
    <line x1="290" y1="328" x2="498" y2="314" marker-end="url(#a3)"/>
    <line x1="400" y1="328" x2="608" y2="314" marker-end="url(#a3)"/>
    <line x1="510" y1="328" x2="718" y2="314" marker-end="url(#a3)"/>
  </g>
  <!-- to output -->
  <g stroke="#1e7a3c" stroke-width="1.3">
    <line x1="180" y1="336" x2="180" y2="374" marker-end="url(#a3)"/>
    <line x1="290" y1="336" x2="290" y2="374" marker-end="url(#a3)"/>
    <line x1="400" y1="336" x2="400" y2="374" marker-end="url(#a3)"/>
    <line x1="510" y1="336" x2="510" y2="374" marker-end="url(#a3)"/>
    <line x1="620" y1="336" x2="620" y2="374" marker-end="url(#a3)"/>
    <line x1="730" y1="336" x2="730" y2="374" marker-end="url(#a3)"/>
  </g>

  <text x="430" y="424" font-size="10.5" text-anchor="middle" fill="#444">⌈log₂L⌉ parallel sweeps · span O(log L), work O(L) · dispatched per (batch, channel d, state n) on a 64-lane workgroup tile</text>
</svg>
