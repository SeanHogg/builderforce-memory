<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#222"/></marker>
  </defs>
  <rect x="0" y="0" width="940" height="470" fill="#ffffff"/>
  <text x="470" y="28" font-size="18" text-anchor="middle" font-weight="bold">Hybrid SSM Block (Mamba-1 / S6 layer) — selective dataflow</text>

  <!-- residual input -->
  <circle cx="50" cy="200" r="6" fill="#222"/>
  <text x="50" y="185" font-size="12" text-anchor="middle">u</text>
  <line x1="56" y1="200" x2="92" y2="200" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>

  <!-- RMSNorm -->
  <rect x="94" y="178" width="78" height="44" rx="5" fill="#eef2f7" stroke="#222"/>
  <text x="133" y="204" font-size="12" text-anchor="middle">RMSNorm</text>

  <!-- in_proj -->
  <rect x="190" y="160" width="80" height="80" rx="5" fill="#e8f0fb" stroke="#1f4e79"/>
  <text x="230" y="195" font-size="12" text-anchor="middle" font-weight="bold">in_proj</text>
  <text x="230" y="212" font-size="9.5" text-anchor="middle">[2D × d]</text>
  <line x1="172" y1="200" x2="188" y2="200" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>

  <!-- split x / z -->
  <line x1="270" y1="180" x2="300" y2="150" stroke="#222" stroke-width="1.4" marker-end="url(#a2)"/>
  <line x1="270" y1="220" x2="300" y2="330" stroke="#222" stroke-width="1.4" marker-end="url(#a2)"/>
  <text x="284" y="160" font-size="11" font-style="italic">x</text>
  <text x="284" y="300" font-size="11" font-style="italic">z (gate)</text>

  <!-- conv1d -->
  <rect x="302" y="120" width="86" height="44" rx="5" fill="#eef2f7" stroke="#222"/>
  <text x="345" y="140" font-size="11.5" text-anchor="middle">Conv1d</text>
  <text x="345" y="155" font-size="9.5" text-anchor="middle">causal, K=4</text>

  <!-- SiLU -->
  <rect x="404" y="120" width="60" height="44" rx="5" fill="#eef2f7" stroke="#222"/>
  <text x="434" y="146" font-size="12" text-anchor="middle">SiLU</text>
  <line x1="388" y1="142" x2="402" y2="142" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>

  <!-- x_proj -->
  <rect x="486" y="100" width="92" height="84" rx="5" fill="#e8f0fb" stroke="#1f4e79"/>
  <text x="532" y="128" font-size="12" text-anchor="middle" font-weight="bold">x_proj</text>
  <text x="532" y="146" font-size="9.3" text-anchor="middle">→ Δ (R)</text>
  <text x="532" y="160" font-size="9.3" text-anchor="middle">→ B (N)</text>
  <text x="532" y="174" font-size="9.3" text-anchor="middle">→ C (N)</text>
  <line x1="464" y1="142" x2="484" y2="142" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>

  <!-- dt_proj -->
  <rect x="486" y="200" width="92" height="40" rx="5" fill="#e8f0fb" stroke="#1f4e79"/>
  <text x="532" y="218" font-size="11" text-anchor="middle" font-weight="bold">dt_proj</text>
  <text x="532" y="232" font-size="9" text-anchor="middle">Δ: R→D, softplus</text>
  <line x1="532" y1="184" x2="532" y2="198" stroke="#222" stroke-width="1.4" marker-end="url(#a2)"/>

  <!-- selective scan -->
  <rect x="610" y="110" width="150" height="120" rx="6" fill="#fde8d6" stroke="#9c4a13" stroke-width="1.5"/>
  <text x="685" y="134" font-size="12.5" text-anchor="middle" font-weight="bold">Selective Scan</text>
  <text x="685" y="150" font-size="9.8" text-anchor="middle">ZOH discretise:</text>
  <text x="685" y="166" font-size="10.5" text-anchor="middle" font-style="italic">Ā=exp(ΔA)</text>
  <text x="685" y="181" font-size="10.5" text-anchor="middle" font-style="italic">B̄=(Ā−1)A⁻¹B</text>
  <text x="685" y="199" font-size="10.5" text-anchor="middle" font-style="italic">hₜ=Āhₜ₋₁+B̄xₜ</text>
  <text x="685" y="215" font-size="10.5" text-anchor="middle" font-style="italic">yₜ=Chₜ+Dxₜ</text>
  <line x1="578" y1="142" x2="608" y2="150" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="578" y1="220" x2="608" y2="195" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>

  <!-- gate multiply -->
  <circle cx="660" cy="330" r="20" fill="#fdeef0" stroke="#9c2533" stroke-width="1.5"/>
  <text x="660" y="336" font-size="18" text-anchor="middle" font-weight="bold">×</text>
  <text x="660" y="372" font-size="9.5" text-anchor="middle">y ⊙ SiLU(z)</text>
  <line x1="685" y1="230" x2="668" y2="312" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>
  <line x1="300" y1="330" x2="638" y2="330" stroke="#222" stroke-width="1.4" marker-end="url(#a2)"/>

  <!-- out_proj -->
  <rect x="720" y="308" width="92" height="44" rx="5" fill="#e8f0fb" stroke="#1f4e79"/>
  <text x="766" y="328" font-size="12" text-anchor="middle" font-weight="bold">out_proj</text>
  <text x="766" y="343" font-size="9.3" text-anchor="middle">[d × D]</text>
  <line x1="680" y1="330" x2="718" y2="330" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>

  <!-- residual add -->
  <circle cx="860" cy="330" r="16" fill="#eef2f7" stroke="#222"/>
  <text x="860" y="336" font-size="16" text-anchor="middle">+</text>
  <line x1="812" y1="330" x2="844" y2="330" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>
  <!-- residual skip path -->
  <path d="M50,206 L50,420 L860,420 L860,346" fill="none" stroke="#222" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#a2)"/>
  <text x="430" y="436" font-size="10.5" text-anchor="middle" fill="#555">residual stream (skip)</text>

  <line x1="876" y1="330" x2="912" y2="330" stroke="#222" stroke-width="1.6" marker-end="url(#a2)"/>
  <text x="922" y="334" font-size="12" text-anchor="middle">u′</text>

  <!-- caption strip -->
  <text x="470" y="458" font-size="10.5" text-anchor="middle" fill="#444">A stored as log(−A) for stability · parallel Kogge–Stone associative scan: (a₁,b₁)∘(a₂,b₂)=(a₁a₂, a₁b₂+b₁) · O(L log L) on GPU</text>
</svg>
