<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a7" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#222"/></marker>
  </defs>
  <rect x="0" y="0" width="820" height="400" fill="#ffffff"/>
  <text x="410" y="28" font-size="18" text-anchor="middle" font-weight="bold">Limbic recurrent affect cell (gated leaky integrator)</text>

  <!-- inputs -->
  <rect x="40" y="80" width="120" height="44" rx="6" fill="#e8f0fb" stroke="#1f4e79"/>
  <text x="100" y="100" font-size="11.5" text-anchor="middle" font-weight="bold">experience x</text>
  <text x="100" y="116" font-size="9.5" text-anchor="middle">dim 32</text>

  <rect x="40" y="160" width="120" height="44" rx="6" fill="#fdeef0" stroke="#9c2533"/>
  <text x="100" y="180" font-size="11.5" text-anchor="middle" font-weight="bold">affect state s</text>
  <text x="100" y="196" font-size="9.5" text-anchor="middle">dim 8 (setpoints)</text>

  <rect x="40" y="240" width="120" height="44" rx="6" fill="#eef2f7" stroke="#222"/>
  <text x="100" y="260" font-size="11.5" text-anchor="middle" font-weight="bold">prev hidden h</text>
  <text x="100" y="276" font-size="9.5" text-anchor="middle">dim 16</text>

  <!-- pre-activation -->
  <rect x="230" y="120" width="160" height="64" rx="6" fill="#fde8d6" stroke="#9c4a13"/>
  <text x="310" y="143" font-size="11.5" text-anchor="middle" font-weight="bold">pre = Wₓx + Wₛs</text>
  <text x="310" y="163" font-size="10.5" text-anchor="middle" font-style="italic">a = σ(A)  (per-channel gate)</text>
  <text x="310" y="178" font-size="9" text-anchor="middle">dynamics</text>
  <line x1="160" y1="102" x2="228" y2="138" stroke="#222" stroke-width="1.4" marker-end="url(#a7)"/>
  <line x1="160" y1="182" x2="228" y2="158" stroke="#222" stroke-width="1.4" marker-end="url(#a7)"/>

  <!-- recurrent update -->
  <rect x="440" y="120" width="190" height="64" rx="6" fill="#e9f6ec" stroke="#1e7a3c"/>
  <text x="535" y="146" font-size="11.5" text-anchor="middle" font-weight="bold">h′ = a⊙h + (1−a)⊙tanh(pre)</text>
  <text x="535" y="166" font-size="9.5" text-anchor="middle">gated leaky integration of affect</text>
  <line x1="390" y1="152" x2="438" y2="152" stroke="#222" stroke-width="1.5" marker-end="url(#a7)"/>
  <!-- recurrent feedback -->
  <path d="M100,240 L100,222 L210,222 L210,300 L535,300 L535,186" stroke="#1e7a3c" stroke-width="1.3" fill="none" stroke-dasharray="4 3" marker-end="url(#a7)"/>
  <text x="360" y="316" font-size="9.5" fill="#1e7a3c">recurrent feedback  h ← h′</text>

  <!-- outputs -->
  <rect x="680" y="95" width="120" height="48" rx="6" fill="#fdeef0" stroke="#9c2533"/>
  <text x="740" y="116" font-size="11" text-anchor="middle" font-weight="bold">Δ affect</text>
  <text x="740" y="133" font-size="9" text-anchor="middle">tanh(Wₒh′+b) ∈(−1,1)</text>

  <rect x="680" y="165" width="120" height="44" rx="6" fill="#eef2f7" stroke="#222"/>
  <text x="740" y="185" font-size="11" text-anchor="middle" font-weight="bold">reward r̂</text>
  <text x="740" y="201" font-size="9" text-anchor="middle">Wᵣh′ + bᵣ</text>

  <line x1="630" y1="142" x2="678" y2="120" stroke="#222" stroke-width="1.4" marker-end="url(#a7)"/>
  <line x1="630" y1="162" x2="678" y2="185" stroke="#222" stroke-width="1.4" marker-end="url(#a7)"/>

  <!-- training note -->
  <rect x="120" y="338" width="580" height="48" rx="6" fill="#f7faff" stroke="#1f4e79" stroke-width="1.2"/>
  <text x="410" y="358" font-size="11" text-anchor="middle" font-weight="bold" fill="#1f4e79">Training: MSE on (Δaffect, reward) targets · truncated BPTT(1) · AdamW (lr 0.05)</text>
  <text x="410" y="376" font-size="9.7" text-anchor="middle" fill="#444">personality fixes the setpoints; the limbic cell supplies the moment-to-moment dynamics around them</text>
</svg>
