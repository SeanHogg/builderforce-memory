<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a6" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#222"/></marker>
  </defs>
  <rect x="0" y="0" width="860" height="380" fill="#ffffff"/>
  <text x="430" y="28" font-size="18" text-anchor="middle" font-weight="bold">Hybrid recall: dense + sparse → reciprocal-rank fusion → MMR rerank</text>

  <!-- query -->
  <rect x="40" y="150" width="120" height="56" rx="6" fill="#eef2f7" stroke="#222"/>
  <text x="100" y="174" font-size="13" text-anchor="middle" font-weight="bold">query q</text>
  <text x="100" y="192" font-size="9.5" text-anchor="middle">text + vector</text>

  <!-- dense -->
  <rect x="220" y="70" width="200" height="80" rx="6" fill="#e8f0fb" stroke="#1f4e79"/>
  <text x="320" y="94" font-size="12.5" text-anchor="middle" font-weight="bold" fill="#1f4e79">Dense ranking</text>
  <text x="320" y="113" font-size="10.5" text-anchor="middle">cos(q,d) = q·d / (‖q‖‖d‖)</text>
  <text x="320" y="131" font-size="9.5" text-anchor="middle">L2-normalized SSM embeddings</text>

  <!-- sparse -->
  <rect x="220" y="205" width="200" height="86" rx="6" fill="#e9f6ec" stroke="#1e7a3c"/>
  <text x="320" y="229" font-size="12.5" text-anchor="middle" font-weight="bold" fill="#1e7a3c">Sparse ranking (BM25)</text>
  <text x="320" y="249" font-size="9.3" text-anchor="middle">Σ idf(t)·tf(k₁+1) /</text>
  <text x="320" y="263" font-size="9.3" text-anchor="middle">(tf + k₁(1−b+b·|d|/avg))</text>
  <text x="320" y="280" font-size="9" text-anchor="middle">k₁=1.5, b=0.75 · Jaccard fallback</text>

  <line x1="160" y1="168" x2="218" y2="120" stroke="#222" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="160" y1="188" x2="218" y2="240" stroke="#222" stroke-width="1.5" marker-end="url(#a6)"/>

  <!-- RRF -->
  <rect x="480" y="135" width="170" height="90" rx="6" fill="#fde8d6" stroke="#9c4a13"/>
  <text x="565" y="160" font-size="12.5" text-anchor="middle" font-weight="bold" fill="#9c4a13">RRF fusion</text>
  <text x="565" y="181" font-size="10.5" text-anchor="middle">score(d)=Σ wₗ /(k+rankₗ)</text>
  <text x="565" y="199" font-size="10" text-anchor="middle">k = 60</text>
  <text x="565" y="216" font-size="9.3" text-anchor="middle">rank-only, scale-free fusion</text>
  <line x1="420" y1="110" x2="478" y2="160" stroke="#222" stroke-width="1.5" marker-end="url(#a6)"/>
  <line x1="420" y1="248" x2="478" y2="200" stroke="#222" stroke-width="1.5" marker-end="url(#a6)"/>

  <!-- MMR -->
  <rect x="700" y="135" width="130" height="90" rx="6" fill="#fdeef0" stroke="#9c2533"/>
  <text x="765" y="160" font-size="12.5" text-anchor="middle" font-weight="bold" fill="#9c2533">MMR rerank</text>
  <text x="765" y="182" font-size="9.3" text-anchor="middle">λ·sim(q,d)</text>
  <text x="765" y="197" font-size="9.3" text-anchor="middle">−(1−λ)·maxₛ sim(d,s)</text>
  <text x="765" y="214" font-size="9.3" text-anchor="middle">λ=0.7 (diversity)</text>
  <line x1="650" y1="180" x2="698" y2="180" stroke="#222" stroke-width="1.5" marker-end="url(#a6)"/>

  <!-- topK out -->
  <rect x="340" y="320" width="180" height="44" rx="6" fill="#eef2f7" stroke="#222"/>
  <text x="430" y="347" font-size="13" text-anchor="middle" font-weight="bold">top-K facts → context</text>
  <path d="M765,225 L765,342 L522,342" stroke="#222" stroke-width="1.5" fill="none" marker-end="url(#a6)"/>

  <text x="430" y="374" font-size="10" text-anchor="middle" fill="#444">hybridRetrieve() · packages/memory/src/retrieval — selective top-K (default 5, hard-capped, content-truncated) keeps prompts small</text>
</svg>
