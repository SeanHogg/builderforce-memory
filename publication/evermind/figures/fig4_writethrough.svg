<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="a4" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#222"/></marker>
  </defs>
  <rect x="0" y="0" width="900" height="500" fill="#ffffff"/>
  <text x="450" y="28" font-size="18" text-anchor="middle" font-weight="bold">Write-Through Cognition: belief reconciliation pipeline</text>
  <text x="450" y="49" font-size="12" text-anchor="middle" fill="#444">update ≡ replace — a fact is written through, never appended into a reconciliation backlog</text>

  <!-- pipeline stages -->
  <g>
    <rect x="40" y="80" width="130" height="56" rx="6" fill="#eef2f7" stroke="#222"/>
    <text x="105" y="104" font-size="12.5" text-anchor="middle" font-weight="bold">Canonicalize</text>
    <text x="105" y="122" font-size="9.5" text-anchor="middle">stable subjectKey</text>

    <rect x="200" y="80" width="130" height="56" rx="6" fill="#e9f6ec" stroke="#1e7a3c"/>
    <text x="265" y="104" font-size="12.5" text-anchor="middle" font-weight="bold">Recall incumbent</text>
    <text x="265" y="122" font-size="9.5" text-anchor="middle">store.recall(key)</text>

    <rect x="360" y="80" width="130" height="56" rx="6" fill="#fde8d6" stroke="#9c4a13"/>
    <text x="425" y="104" font-size="12.5" text-anchor="middle" font-weight="bold">Evaluate</text>
    <text x="425" y="122" font-size="9.5" text-anchor="middle">evidence gather</text>

    <rect x="520" y="80" width="150" height="56" rx="6" fill="#fdeef0" stroke="#9c2533"/>
    <text x="595" y="104" font-size="12.5" text-anchor="middle" font-weight="bold">Reconcile</text>
    <text x="595" y="122" font-size="9.5" text-anchor="middle">verdict V(·)</text>

    <rect x="700" y="80" width="160" height="56" rx="6" fill="#e8f0fb" stroke="#1f4e79"/>
    <text x="780" y="104" font-size="12.5" text-anchor="middle" font-weight="bold">Write-through</text>
    <text x="780" y="122" font-size="9.5" text-anchor="middle">+ bump version</text>
  </g>
  <g stroke="#222" stroke-width="1.6">
    <line x1="170" y1="108" x2="198" y2="108" marker-end="url(#a4)"/>
    <line x1="330" y1="108" x2="358" y2="108" marker-end="url(#a4)"/>
    <line x1="490" y1="108" x2="518" y2="108" marker-end="url(#a4)"/>
    <line x1="670" y1="108" x2="698" y2="108" marker-end="url(#a4)"/>
  </g>

  <!-- verdict branch -->
  <text x="595" y="166" font-size="12" text-anchor="middle" font-weight="bold">verdict V(claim, incumbent, evidence)</text>
  <line x1="595" y1="136" x2="595" y2="172" stroke="#9c2533" stroke-width="1.4" marker-end="url(#a4)"/>

  <g font-size="11">
    <!-- augment -->
    <rect x="60" y="190" width="180" height="86" rx="6" fill="#ffffff" stroke="#1e7a3c" stroke-width="1.4"/>
    <text x="150" y="212" font-size="12.5" text-anchor="middle" font-weight="bold" fill="#1e7a3c">augment</text>
    <text x="150" y="231" font-size="10" text-anchor="middle">∅ → claim  (new subject)</text>
    <text x="150" y="248" font-size="10" text-anchor="middle">importance ← 0.6</text>
    <text x="150" y="265" font-size="10" text-anchor="middle">writes · invalidates cache</text>

    <!-- confirm -->
    <rect x="260" y="190" width="180" height="86" rx="6" fill="#ffffff" stroke="#1f4e79" stroke-width="1.4"/>
    <text x="350" y="212" font-size="12.5" text-anchor="middle" font-weight="bold" fill="#1f4e79">confirm</text>
    <text x="350" y="231" font-size="10" text-anchor="middle">claim ≡ incumbent</text>
    <text x="350" y="248" font-size="10" text-anchor="middle">importance ← min(1, +0.1)</text>
    <text x="350" y="265" font-size="10" text-anchor="middle">no replacement</text>

    <!-- supersede -->
    <rect x="460" y="190" width="180" height="86" rx="6" fill="#fff6e8" stroke="#9c4a13" stroke-width="1.6"/>
    <text x="550" y="212" font-size="12.5" text-anchor="middle" font-weight="bold" fill="#9c4a13">supersede</text>
    <text x="550" y="231" font-size="10" text-anchor="middle">incumbent → claim</text>
    <text x="550" y="248" font-size="10" text-anchor="middle">iff evidence.supportsNew</text>
    <text x="550" y="265" font-size="10" text-anchor="middle">importance ← max(0.9) · invalidate</text>

    <!-- reject -->
    <rect x="660" y="190" width="180" height="86" rx="6" fill="#f4f4f4" stroke="#777" stroke-width="1.4"/>
    <text x="750" y="212" font-size="12.5" text-anchor="middle" font-weight="bold" fill="#555">reject</text>
    <text x="750" y="231" font-size="10" text-anchor="middle">¬evidence.supportsNew</text>
    <text x="750" y="248" font-size="10" text-anchor="middle">incumbent retained</text>
    <text x="750" y="265" font-size="10" text-anchor="middle">no write</text>
  </g>
  <g stroke="#9c2533" stroke-width="1.2">
    <line x1="560" y1="180" x2="180" y2="188" marker-end="url(#a4)"/>
    <line x1="575" y1="180" x2="360" y2="188" marker-end="url(#a4)"/>
    <line x1="600" y1="180" x2="560" y2="188" marker-end="url(#a4)"/>
    <line x1="620" y1="180" x2="740" y2="188" marker-end="url(#a4)"/>
  </g>

  <!-- version-token cache panel -->
  <rect x="120" y="320" width="660" height="130" rx="8" fill="#f7faff" stroke="#1f4e79" stroke-width="1.3"/>
  <text x="450" y="344" font-size="13.5" text-anchor="middle" font-weight="bold" fill="#1f4e79">Version-token recall cache (read-through, invalidate-on-write)</text>
  <text x="450" y="368" font-size="11.5" text-anchor="middle">cacheKey = ⟨ version ∥ topK ∥ query ⟩</text>
  <text x="450" y="390" font-size="11.5" text-anchor="middle" font-style="italic">on any augment / supersede:  version ← version + 1   ⇒   every prior key misses (O(1) global invalidation)</text>
  <text x="450" y="414" font-size="11" text-anchor="middle" fill="#444">Reads are always current; no manual reconcile step; stale and fresh facts never co-exist under the same key.</text>
  <text x="450" y="434" font-size="10" text-anchor="middle" fill="#666">EvermindCognition.commit() · packages/memory/src/cognition/EvermindCognition.ts</text>

  <line x1="595" y1="276" x2="450" y2="318" stroke="#1f4e79" stroke-width="1.3" marker-end="url(#a4)"/>
  <line x1="150" y1="276" x2="320" y2="318" stroke="#1e7a3c" stroke-width="1.3" marker-end="url(#a4)"/>
</svg>
